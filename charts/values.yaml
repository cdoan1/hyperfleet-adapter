# Default values for hyperfleet-adapter
# This is a YAML-formatted file.

## Application configuration section
## ================================
# AdapterConfig (deployment/client config) can be created:
# - option1: from an existing ConfigMap by setting configMapName
# - option2: from a YAML file by setting yaml
# - option3: from a set of files by setting files
adapterConfig:
  create: true

  # option1: ConfigMap name (if different from default, and set create: false)
  #configMapName: ""

  yaml: |
    apiVersion: hyperfleet.redhat.com/v1alpha1
    kind: AdapterConfig
    metadata:
      name: adapter1
      labels:
        hyperfleet.io/adapter-type: kubernetes
        hyperfleet.io/component: adapter
    spec:
      adapter:
        version: "0.1.0"
      debugConfig: true
      log:
        level: debug
      clients:
        hyperfleetApi:
          baseUrl: http://hyperfleet-api:8000
          version: v1
          timeout: 2s
          retryAttempts: 3
          retryBackoff: exponential
        broker:
          # These values are overridden at deploy time via env vars from Helm values
          subscriptionId: "placeholder"
          topic: "placeholder"
        kubernetes:
          apiVersion: "v1"


  # option2: AdapterConfig YAML (creates adapter-config.yaml key in ConfigMap)
  # yaml:
  #  apiVersion: hyperfleet.redhat.com/v1alpha1
  #  kind: AdapterConfig

  # option3: AdapterConfig YAML files packaged with the chart
  # files:
    # adapter-config.yaml: examples/adapter-config.yaml

  # HyperFleet API env vars used by task params
  hyperfleetApi:
    # Base URL for HyperFleet API (HYPERFLEET_API_BASE_URL)
    baseUrl: http://hyperfleet-api:8000
    # API version (HYPERFLEET_API_VERSION), default: v1
    version: "v1"

  log:
    level: info

# AdapterTaskConfig (business logic) can be created:
# - option1: from an existing ConfigMap by setting configMapName
# - option2: from a YAML file by setting yaml
# - option3: from a set of files by setting files
adapterTaskConfig:
  create: true
  yaml: |
    apiVersion: hyperfleet.redhat.com/v1alpha1
    kind: AdapterTaskConfig
    metadata:
      name: adapter1
      labels:
        hyperfleet.io/adapter-type: adapter1
        hyperfleet.io/component: adapter
    spec:
      # Parameters with all required variables
      params:
        - name: "clusterId"
          source: "event.id"
          type: "string"
          required: true

        - name: "generation"
          source: "event.generation"
          type: "int"
          required: true

        - name: "namespace"
          source: "env.NAMESPACE"
          type: "string"

      # Preconditions with valid operators and CEL expressions
      preconditions:
        - name: "clusterStatus"
          apiCall:
            method: "GET"
            url: "/clusters/{{ .clusterId }}"
            timeout: 10s
            retryAttempts: 3
            retryBackoff: "exponential"
          capture:
            - name: "clusterName"
              field: "name"
            - name: "generation"
              field: "generation"
            - name: "readyConditionStatus"
              expression: |
                status.conditions.filter(c, c.type == "Ready").size() > 0
                  ? status.conditions.filter(c, c.type == "Ready")[0].status
                  : "False"
          # Structured conditions with valid operators
          conditions:
            - field: "readyConditionStatus"
              operator: "equals"
              value: "False"

        - name: "validationCheck"
          # Valid CEL expression
          expression: |
            readyConditionStatus == "False"

      # Resources with valid K8s manifests
      resources:
        - name: "resource0"
          transport:
            client: "kubernetes"
          manifest:
            apiVersion: v1
            kind: ConfigMap
            data:
              cluster_id: "{{ .clusterId }}"
              cluster_name: "{{ .clusterName }}"
            metadata:
              name: "{{ .clusterId }}-adapter1-configmap"
              namespace: "{{ .namespace }}"
              labels:
                app.kubernetes.io/component: adapter
                app.kubernetes.io/instance: adapter1
                app.kubernetes.io/name: hyperfleet-adapter
                app.kubernetes.io/version: 1.0.0
                app.kubernetes.io/transport: kubernetes
                hyperfleet.io/cluster-id: "{{ .clusterId }}"
                hyperfleet.io/cluster-name: "{{ .clusterName }}"
          discovery:
            namespace: "{{ .namespace }}"
            bySelectors:
              labelSelector:
                hyperfleet.io/cluster-id: "{{ .clusterId }}"
                hyperfleet.io/cluster-name: "{{ .clusterName }}"

      # Post-processing with valid CEL expressions
      # This example contains multiple resources, we will only report on the conditions of the jobNamespace not to overcomplicate the example
      post:
        payloads:
          - name: "statusPayload"
            build:
              # TODO: this should come from config.adapter.metadata.name
              adapter: "adapter1"
              conditions:
                # Applied: Job successfully created
                - type: "Applied"
                  status:
                    expression: |
                      has(resources.resource0.metadata.creationTimestamp) ? "True" : "False"
                  reason:
                    expression: |
                      has(resources.resource0.metadata.creationTimestamp) ? "ConfigMapApplied" : "ConfigMapPending"
                  message:
                    expression: |
                      has(resources.resource0.metadata.creationTimestamp) 
                      ? "ConfigMap has been applied correctly" 
                      : "ConfigMap is pending to be applied"
                # Available: Check job status conditions
                - type: "Available"
                  status:
                    expression: |
                      has(resources.resource0.data.cluster_id) ? "True" : "False"
                  reason:
                    expression: |
                      has(resources.resource0.data.cluster_id) 
                        ? "ConfigMap data available"
                        : "ConfigMap data not yet available"
                  message:
                    expression: |
                      has(resources.resource0.data.cluster_id) 
                        ? "ConfigMap data available"
                        : "ConfigMap data not yet available"
                # Health: Adapter execution status (runtime)
                - type: "Health"
                  status:
                    expression: |
                      adapter.?executionStatus.orValue("") == "success" ? "True" : (adapter.?executionStatus.orValue("") == "failed" ? "False" : "Unknown")
                  reason:
                    expression: |
                      adapter.?errorReason.orValue("") != "" ? adapter.?errorReason.orValue("") : "Healthy"
                  message:
                    expression: |
                      adapter.?errorMessage.orValue("") != "" ? adapter.?errorMessage.orValue("") : "All adapter operations completed successfully"
              # Event generation ID metadata field needs to use expression to avoid interpolation issues
              observed_generation:
                expression: "generation"
              observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"
              # Optional data field for adapter-specific metrics extracted from resources
              data:
                namespace:
                  name:
                    expression: |
                      resources.?resources.resource0.?metadata.?name.orValue("")
                  creationTimestamp:
                    expression: |
                      resources.?resources.resource0.?metadata.?creationTimestamp.orValue("")

        postActions:
          - name: "reportClusterStatus"
            apiCall:
              method: "POST"
              url: "/clusters/{{ .clusterId }}/statuses"
              headers:
                - name: "Content-Type"
                  value: "application/json"
              body: "{{ .statusPayload }}"


  # option1: ConfigMap name (if different from default, and set create: false)
  #configMapName: ""

  # option2: AdapterTaskConfig YAML (creates task-config.yaml key in ConfigMap)
  # yaml:
  #  apiVersion: hyperfleet.redhat.com/v1alpha1
  #  kind: AdapterTaskConfig

  # option3: AdapterTaskConfig YAML files packaged with the chart
  # files:
    # task-config.yaml: examples/adapter-task-config.yaml


# Broker configuration can be created:
# - option1: from an existing ConfigMap by setting configMapName
# - option2: from a YAML file by setting yaml
# - option3: from a set of properties under broker.googlepubsub, broker.rabbitmq, etc.
broker:
  create: true
  # option1
  # configMapName: ""
  
  # option2
  # yaml: ""

  # option3: Broker type identifier (googlepubsub, rabbitmq, etc.) - used as label
  # Subscription/topic are used to set adapter broker config overrides
  # googlepubsub:
  #   projectId: ""
  #   subscriptionId: ""
  #   topic: ""
  #   deadLetterTopic: ""
  #   # Auto-creation flags (default: false - infrastructure must pre-exist)
  #   # Set to true for development/testing; use false in production with pre-provisioned resources
  #   createTopicIfMissing: false
  #   createSubscriptionIfMissing: false
  # option3: for rabbitmq
  #rabbitmq:
  # url: ""
  # queue: ""
  # exchange: ""
  # exchangeType: "topic"
  # routingKey: ""

  rabbitmq:
    enabled: false

  # option3: for external broker (e.g. Amazon MQ)
  external:
    enabled: true
    # Use AWS Pod Identity + Secrets Store CSI to load MQ credentials from AWS Secrets Manager.
    # When true, the chart creates a SecretProviderClass and mounts the secret; env vars
    # BROKER_RABBITMQ_URL, BROKER_USERNAME, BROKER_PASSWORD, BROKER_HOST, BROKER_PORT are
    # injected from the AWS secret (see broker.external.aws.secretName).
    podidentity: true
    secretMountPath: /mnt/secrets-store
    # Name of the SecretProviderClass (created by chart when createSecretProviderClass is true)
    secretProviderClass: "hyperfleet-adapter-mq-secrets"
    createSecretProviderClass: true
    # AWS Secrets Manager config when createSecretProviderClass is true.
    # Expected secret JSON format (e.g. from: aws secretsmanager get-secret-value --secret-id <secretName> --query SecretString --output text):
    #   { "host": "...", "password": "...", "port": "5671", "url": "amqps://user:pass@host:5671", "username": "..." }
    aws:
      region: "us-east-2"
      secretName: "hyperfleet/mq-credentials"
    # When podidentity is false, set url here. When podidentity is true, url comes from the AWS secret.
    url: ""
    exchangeType: "topic"
    queue: "hyperfleet-clusters-landing-zone"
    exchange: "hyperfleet-clusters"
    routingKey: "#"


## Kubernetes configuration section
## ================================

replicaCount: 1

# This is the image for the adapter framework
image:
  registry: quay.io/openshift-hyperfleet
  repository: hyperfleet-adapter
  pullPolicy: Always
  tag: v0.1.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Deployment configuration
deploymentLabels: {}
deploymentAnnotations: {}

# Pod labels (in addition to selector labels)
podLabels: {}

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Minimum number of seconds for which a newly created pod should be ready
minReadySeconds: 0

# The number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 10

# Container ports for health and metrics endpoints
containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP
  - name: metrics
    containerPort: 9090
    protocol: TCP

# Override default command
command:
  - /app/adapter

# Override default args
args:
  - serve
  - --config
  - /etc/adapter/adapter-config.yaml
  - --task-config
  - /etc/adapter/task-config.yaml

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: hyperfleet-adapter-sa

# RBAC permissions are needed if the adapter task needs to interact with CLM cluster
# e.g. if triggering a job that must update its status to report conditions
rbac:
  create: true
  # Resources to grant full access (get, list, watch, create, update, patch, delete)
  # apiGroup is auto-detected based on resource type
  # resources:
  #   - namespaces
  #   - serviceaccounts
  #   - configmaps
  #   - deployments
  #   - pods
  #   - roles
  #   - rolebindings
  #   - jobs
  #   - jobs/status
  # Additional custom rules (appended to auto-generated rules)
  rules: []

podAnnotations: {}

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration (per HyperFleet health-endpoints standard)
# Uses K8s defaults: initialDelaySeconds=0, periodSeconds=10, timeoutSeconds=1, failureThreshold=3
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 8080

# Readiness probe configuration (per HyperFleet health-endpoints standard)
# Uses K8s defaults: initialDelaySeconds=0, periodSeconds=10, timeoutSeconds=1, failureThreshold=3
readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: 8080

# Startup probe configuration (useful for slow-starting containers)
# Uses K8s defaults when enabled
startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: 8080

# Lifecycle hooks
lifecycle: {}
  # preStop:
  #   exec:
  #     command:
  #       - /bin/sh
  #       - -c
  #       - sleep 10

# Priority class name for pod scheduling
priorityClassName: ""

# Termination grace period in seconds
terminationGracePeriodSeconds: 30

# Init containers
initContainers: []
  # - name: init-myservice
  #   image: busybox:1.28
  #   command: ['sh', '-c', 'until nslookup myservice; do echo waiting; sleep 2; done']

# Sidecar containers
sidecarContainers: []
  # - name: sidecar
  #   image: nginx:1.19
  #   ports:
  #     - containerPort: 80

nodeSelector: {}

tolerations: []

affinity: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80


# Environment variables
env: []
  # - name: ADAPTER_CONFIG_PATH
  #   value: /path/to/custom/config.yaml
  # - name: MY_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: secret-key

# envFrom for loading entire ConfigMaps/Secrets as environment variables
envFrom: []
  # - configMapRef:
  #     name: my-configmap
  # - secretRef:
  #     name: my-secret

# Volume mounts for additional configs
extraVolumeMounts: []
  # - name: custom-config
  #   mountPath: /etc/custom
  #   readOnly: true

# Additional volumes
extraVolumes: []
  # - name: custom-config
  #   configMap:
  #     name: custom-configmap

# Pod Disruption Budget
# PDB protects availability during voluntary disruptions (node maintenance, cluster upgrades).
# Set minAvailable OR maxUnavailable (not both). Use maxUnavailable with HPA for smoother scaling.
podDisruptionBudget:
  enabled: true
  # minAvailable: 1
  maxUnavailable: 1
  # unhealthyPodEvictionPolicy: IfHealthyBudget
