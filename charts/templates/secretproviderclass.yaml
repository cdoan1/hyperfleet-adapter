{{- if and (not .Values.broker.rabbitmq.enabled) .Values.broker.external.enabled .Values.broker.external.podidentity .Values.broker.external.createSecretProviderClass .Values.broker.external.aws }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.broker.external.secretProviderClass | default (printf "%s-mq-secrets" (include "hyperfleet-adapter.fullname" .)) }}
  labels:
    {{- include "hyperfleet-adapter.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    region: {{ .Values.broker.external.aws.region | quote }}
    usePodIdentity: "true"
    # AWS Secrets Manager secret (e.g. hyperfleet/mq-credentials) with JSON keys: host, password, port, url, username
    objects: |
      - objectName: {{ .Values.broker.external.aws.secretName | quote }}
        objectType: "secretsmanager"
        jmesPath:
          - path: url
            objectAlias: BROKER_RABBITMQ_URL
          - path: username
            objectAlias: BROKER_USERNAME
          - path: password
            objectAlias: BROKER_PASSWORD
          - path: host
            objectAlias: BROKER_HOST
          - path: port
            objectAlias: BROKER_PORT
  secretObjects:
    - secretName: {{ include "hyperfleet-adapter.fullname" . }}-mq-secret
      type: Opaque
      data:
        - objectName: BROKER_RABBITMQ_URL
          key: BROKER_RABBITMQ_URL
        - objectName: BROKER_USERNAME
          key: BROKER_USERNAME
        - objectName: BROKER_PASSWORD
          key: BROKER_PASSWORD
        - objectName: BROKER_HOST
          key: BROKER_HOST
        - objectName: BROKER_PORT
          key: BROKER_PORT
{{- end }}
