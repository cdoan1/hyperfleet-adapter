{{- if and .Values.broker.create (eq (include "hyperfleet-adapter.brokerType" .) "rabbitmq") }}
{{- $mq := .Values.broker.rabbitmq }}
{{- $ext := .Values.broker.external }}
{{- if and $mq.podidentity.enabled $mq.podidentity.secretproviderclass $ext.aws.secretName }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "hyperfleet-adapter.brokerSecretProviderClassName" . }}
  labels:
    {{- include "hyperfleet-adapter.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    region: {{ $ext.aws.region | quote }}
    usePodIdentity: "true"
    # AWS Secrets Manager secret (e.g. hyperfleet/mq-credentials) with JSON keys: host, password, port, url, username
    objects: |
      - objectName: {{ $ext.aws.secretName | quote }}
        objectType: "secretsmanager"
        jmesPath:
          - path: url
            objectAlias: BROKER_URL
          - path: username
            objectAlias: BROKER_USERNAME
          - path: password
            objectAlias: BROKER_PASSWORD
          - path: host
            objectAlias: BROKER_HOST
          - path: port
            objectAlias: BROKER_PORT
  secretObjects:
    - secretName: {{ include "hyperfleet-adapter.brokerExternalSecretName" . }}
      type: Opaque
      data:
        - objectName: BROKER_URL
          key: BROKER_URL
        - objectName: BROKER_USERNAME
          key: BROKER_USERNAME
        - objectName: BROKER_PASSWORD
          key: BROKER_PASSWORD
        - objectName: BROKER_HOST
          key: BROKER_HOST
        - objectName: BROKER_PORT
          key: BROKER_PORT
{{- end }}
{{- end }}
